services:
  mongodb:
    image: mongo:7
    container_name: aandi-report-mongodb-local
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  report-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: aandi-report-server:local
    container_name: aandi-report-server-local
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      MONGO_DB_URL: mongodb://mongodb:27017/aandi
      SWAGGER_URL: http://localhost:8080

volumes:
  mongodb_data:

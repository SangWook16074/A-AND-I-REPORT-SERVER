spring:
  application:
    name: aandi_post_web_server
  config:
    import: optional:file:.env[.properties]

  data:
    mongodb:
      uri: ${MONGO_DB_URL:mongodb://localhost:27017/aandi}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html

swagger:
  server:
    url: ${SWAGGER_URL:https://api.aandiclub.com/v2/report}

app:
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:https://aandiclub.com,https://api.aandiclub.com,http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}
    allowed-methods: ${APP_CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
    allowed-headers: ${APP_CORS_ALLOWED_HEADERS:Authorization,Content-Type,Accept,Origin,X-Requested-With}
    exposed-headers: ${APP_CORS_EXPOSED_HEADERS:}
    allow-credentials: ${APP_CORS_ALLOW_CREDENTIALS:false}
    max-age-seconds: ${APP_CORS_MAX_AGE_SECONDS:3600}

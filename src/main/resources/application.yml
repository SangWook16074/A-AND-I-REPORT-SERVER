spring:
  application:
    name: aandi_post_web_server
  config:
    import: optional:file:.env[.properties]

  data:
    mongodb:
      uri: ${MONGO_DB_URL:mongodb://localhost:27017/aandi}

springdoc:
  api-docs:
    path: /api/report/v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html

swagger:
  server:
    url: ${SWAGGER_URL:http://localhost:8080}
